name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Project Seup
        run: |
          npm run setup
          npm run dev:daemon

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: read

          custom_instruction: |
            The project is already set up with all dependancies installed. The server is already running at localhost:3000.
            Logs from it are being written to log.txt. If needed, you can query db with 'sqlite3' cli.
            Use the following playwright MCP tools to launch the browser and interact with the app:
            - mcp__playwright__browser_navigate: Navigate to a URL
            - mcp__playwright__browser_snapshot: Capture accessibility snapshot of the current page
            - mcp__playwright__browser_take_screenshot: Take a screenshot of the current page
            - mcp__playwright__browser_click: Click an element on the page
            - mcp__playwright__browser_type: Type text into an input field
            - mcp__playwright__browser_fill_form: Fill multiple form fields at once
            - mcp__playwright__browser_hover: Hover over an element
            - mcp__playwright__browser_drag: Drag an element to another location
            - mcp__playwright__browser_press_key: Press a keyboard key
            - mcp__playwright__browser_select_option: Select an option from a dropdown
            - mcp__playwright__browser_navigate_back: Navigate back in browser history
            - mcp__playwright__browser_wait_for: Wait for a condition or selector
            - mcp__playwright__browser_evaluate: Execute JavaScript in the browser context
            - mcp__playwright__browser_run_code: Run code in the browser
            - mcp__playwright__browser_console_messages: Retrieve browser console messages
            - mcp__playwright__browser_network_requests: Retrieve network requests made by the page
            - mcp__playwright__browser_handle_dialog: Handle browser dialogs (alert, confirm, prompt)
            - mcp__playwright__browser_file_upload: Upload a file to an input element
            - mcp__playwright__browser_resize: Resize the browser window
            - mcp__playwright__browser_tabs: Manage browser tabs
            - mcp__playwright__browser_close: Close the browser


          # Optional: Give a custom prompt to Claude. If this is not specified, Claude will perform the instructions specified in the comment that tagged it.
          # prompt: 'Update the pull request description to include a summary of changes.'

          # Optional: Add claude_args to customize behavior and configuration
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options
          # claude_args: '--allowed-tools Bash(gh pr *)'

