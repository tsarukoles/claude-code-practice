name: Update Visual Snapshots

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-snapshots:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: uigen

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: uigen/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: file:./prisma/test.db

      - name: Run migrations on test DB
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: file:./prisma/test.db

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Build Next.js app
        run: npm run build
        env:
          DATABASE_URL: file:./prisma/test.db

      - name: Generate / update snapshots
        run: npx playwright test --project=visual --update-snapshots
        env:
          DATABASE_URL: file:./prisma/test.db
          CI: true
          NODE_OPTIONS: --require ./node-compat.cjs

      - name: Commit updated snapshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ../tests/visual/
          git diff --staged --quiet || git commit -m "chore: update visual regression snapshots [skip ci]"
          git push
